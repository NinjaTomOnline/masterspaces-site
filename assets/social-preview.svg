<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MasterSpaces social preview</title>
  <desc id="desc">MasterSpaces launch card showing a multi-monitor workspace map and product positioning.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf4e8"/>
      <stop offset="1" stop-color="#ead8bf"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="26%" r="55%">
      <stop offset="0" stop-color="#88c9b7" stop-opacity=".55"/>
      <stop offset=".48" stop-color="#d6a15f" stop-opacity=".26"/>
      <stop offset="1" stop-color="#173a4f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0v42" fill="none" stroke="#173a4f" stroke-opacity=".09" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#09202f" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g transform="translate(84 74)">
    <rect width="90" height="90" rx="23" fill="#173a4f"/>
    <rect x="16" y="22" width="58" height="46" rx="8" fill="#f7efe3"/>
    <path d="M24 31h19v13H24V31Zm26 0h17v13H50V31ZM24 51h43v9H24v-9Z" fill="#173a4f"/>
    <path d="M44 46h6M47 43v6" stroke="#c77b42" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(84 205)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" fill="#173a4f">Window layouts</text>
    <text x="0" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" fill="#173a4f">that remember</text>
    <text x="0" y="164" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" fill="#173a4f">the room.</text>
    <text x="0" y="228" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="29" fill="#446072">A local-first macOS menu bar utility for snapping,</text>
    <text x="0" y="266" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="29" fill="#446072">saved layouts, workspace restore, and multi-monitor Macs.</text>
  </g>
  <g transform="translate(704 130)" filter="url(#shadow)">
    <rect x="0" y="58" width="320" height="180" rx="28" fill="#173a4f"/>
    <rect x="36" y="92" width="118" height="70" rx="14" fill="#f7efe3"/>
    <rect x="170" y="92" width="114" height="70" rx="14" fill="#88c9b7"/>
    <rect x="36" y="178" width="248" height="30" rx="12" fill="#d6a15f"/>
    <rect x="202" y="0" width="254" height="144" rx="28" fill="#214b62"/>
    <rect x="236" y="34" width="88" height="48" rx="12" fill="#f7efe3"/>
    <rect x="338" y="34" width="84" height="48" rx="12" fill="#c77b42"/>
    <rect x="236" y="98" width="186" height="18" rx="9" fill="#88c9b7"/>
    <rect x="126" y="274" width="420" height="194" rx="30" fill="#0f2d3f"/>
    <rect x="164" y="313" width="148" height="62" rx="14" fill="#f7efe3"/>
    <rect x="330" y="313" width="178" height="62" rx="14" fill="#88c9b7"/>
    <rect x="164" y="394" width="344" height="34" rx="14" fill="#d6a15f"/>
    <path d="M160 239v35M336 144v130" stroke="#c77b42" stroke-width="6" stroke-linecap="round" stroke-dasharray="13 18"/>
  </g>
  <g transform="translate(84 548)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="24" font-weight="700" fill="#173a4f">MasterSpaces</text>
    <text x="170" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="24" fill="#446072">Direct-download release candidate</text>
  </g>
</svg>
